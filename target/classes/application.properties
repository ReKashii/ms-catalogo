# application.properties - ms-catalogo
# Configuración del Catálogo Público e Interactivo para BookPoint Chile
# Arquitecto de Software: Antigravity

# Puerto del Servidor local
server.port=8084

# Nombre del Microservicio en Spring Boot
spring.application.name=ms-catalogo

# Configuración de Base de Datos MySQL (Esquema: bookpoint_catalogo)
spring.datasource.url=jdbc:mysql://localhost:3306/bookpoint_catalogo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuración JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro y Descubrimiento Eureka (Desactivado temporalmente para pruebas locales)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=false

# Habilitar logging del nivel INFO para trazabilidad de búsquedas y reseñas
logging.level.cl.bookpointchile.catalogo=INFO
